<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наше Дерево Любви ❤️</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #fff5f7; --accent: #ff4d6d; --trunk: #4e342e; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }

        /* СМС Уведомления */
        .notification { position: fixed; top: 20px; width: 85%; max-width: 350px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-left: 6px solid var(--accent); transform: translateY(-180%); transition: transform 0.5s; z-index: 1000; }
        .notification.active { transform: translateY(0); }
        .notification strong { color: var(--accent); display: block; }

        .garden { position: relative; width: 100%; height: 70vh; display: flex; justify-content: center; align-items: flex-end; }
        
        /* Ствол с ветками */
        .tree-base { position: relative; bottom: 30px; }
        .trunk { width: 18px; height: 140px; background: linear-gradient(90deg, #3e2723, #5d4037, #3e2723); border-radius: 10px; position: relative; }
        .branch { position: absolute; background: #5d4037; border-radius: 5px; transform-origin: bottom center; }

        /* Сердечки */
        .heart { position: absolute; background: var(--accent); transform: rotate(-45deg) scale(0); border-radius: 50% 50% 0 0; animation: pop 0.6s forwards; }
        .heart::after { content: ''; position: absolute; width: 100%; height: 100%; background: inherit; border-radius: 50%; top: 0; left: 50%; }
        @keyframes pop { to { transform: rotate(-45deg) scale(1); } }

        /* Кнопка и счетчик */
        .ui { width: 100%; background: white; padding: 25px; text-align: center; border-radius: 35px 35px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 10; }
        .counter { font-size: 2.2rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .btn-grow { background: var(--accent); color: white; border: none; padding: 16px 45px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-grow:disabled { background: #ccc; }
        #wait-msg { color: #888; font-size: 0.9rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="sms" class="notification">
        <strong id="sms-title"></strong>
        <span id="sms-msg"></span>
    </div>

    <div class="garden" id="garden">
        <div class="tree-base">
            <div class="trunk">
                <div class="branch" style="width:8px; height:70px; bottom:60px; left:-15px; transform:rotate(-35deg);"></div>
                <div class="branch" style="width:8px; height:70px; bottom:80px; right:-15px; transform:rotate(35deg);"></div>
            </div>
        </div>
    </div>

    <div class="ui">
        <div class="counter" id="score">0</div>
        <button id="grow-btn" class="btn-grow" onclick="grow()">Подарить любовь ❤️</button>
        <div id="wait-msg">Дереву нужен отдых, приходи завтра! ✨</div>
    </div>

    <script>
        // ТВОЙ КОНФИГ ИЗ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCIeil4dqbnL2m0MV-g-s12N6AQorNo6Zc",
            authDomain: "lovetree-d4d3b.firebaseapp.com",
            databaseURL: "https://lovetree-d4d3b-default-rtdb.firebaseio.com",
            projectId: "lovetree-d4d3b",
            storageBucket: "lovetree-d4d3b.firebasestorage.app",
            messagingSenderId: "293812768556",
            appId: "1:293812768556:web:1d7b0a12cc2302d633a689",
            measurementId: "G-V14ZSBXDRJ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const treeRef = db.ref('shared_tree_data');

        let currentCount = 0;
        const garden = document.getElementById('garden');
        const scoreDisplay = document.getElementById('score');
        const growBtn = document.getElementById('grow-btn');

        // Синхронизация с базой
        treeRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const newCount = (data && data.count) ? data.count : 0;
            
            if (newCount > currentCount) {
                for (let i = currentCount; i < newCount; i++) {
                    createHeart(currentCount === 0); 
                }
                currentCount = newCount;
                scoreDisplay.innerText = currentCount;
            }
        });

        const moments = {
            1: { t: "Начало", m: "Наше общее дерево начало расти! 🌱" },
            10: { t: "Тепло", m: "Каждый день с тобой — это счастье. ❤️" },
            50: { t: "Сила", m: "Смотри, сколько любви мы вырастили вместе! 👑" }
        };

        async function grow() {
            const today = new Date().toDateString();
            if (localStorage.getItem('last_click_date') === today) return;

            await treeRef.transaction((data) => {
                const count = (data && data.count) ? data.count : 0;
                return { count: count + 1 };
            });

            localStorage.setItem('last_click_date', today);
            checkAccess();
            
            if (moments[currentCount + 1]) {
                showSms(moments[currentCount + 1].t, moments[currentCount + 1].m);
            }
        }

        function checkAccess() {
            if (localStorage.getItem('last_click_date') === new Date().toDateString()) {
                growBtn.disabled = true;
                document.getElementById('wait-msg').style.display = 'block';
            }
        }

        function createHeart(isOld) {
            const h = document.createElement('div');
            h.className = 'heart';
            const t = Math.random() * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3) * 10;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 10;
            const size = 12 + Math.random() * 8;
            h.style.width = size + 'px'; h.style.height = size + 'px';
            h.style.left = `calc(50% + ${x}px)`;
            h.style.top = `calc(40% + ${y}px)`;
            h.style.background = ['#ff4d6d', '#ff758f', '#c9184a'][Math.floor(Math.random() * 3)];
            if (isOld) h.style.animation = 'none';
            if (isOld) h.style.transform = 'rotate(-45deg) scale(1)';
            garden.appendChild(h);
        }

        function showSms(title, msg) {
            document.getElementById('sms-title').innerText = title;
            document.getElementById('sms-msg').innerText = msg;
            const sms = document.getElementById('sms');
            sms.classList.add('active');
            setTimeout(() => sms.classList.remove('active'), 5000);
        }

        checkAccess();
    </script>
</body>
</html>
